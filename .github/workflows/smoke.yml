name: smoke

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim: [stable, nightly]
        picker: [snacks, fzf-lua]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}

      - name: Install picker dependency
        run: |
          mkdir -p .tests/deps
          if [ "${{ matrix.picker }}" = "snacks" ]; then
            git clone --depth=1 https://github.com/folke/snacks.nvim .tests/deps/snacks.nvim
          else
            sudo apt-get update
            sudo apt-get install -y fzf
            git clone --depth=1 https://github.com/ibhagwan/fzf-lua .tests/deps/fzf-lua
          fi

      - name: Run smoke test
        run: nvim --headless -u NONE -l scripts/smoke_test.lua
        env:
          CPPMAN_PICKER_PROVIDER: ${{ matrix.picker }}
